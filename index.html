<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteVerdict – Der KI-Assistent für Bausachverständige</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F6F8;
    --surface: #FFFFFF;
    --surface2: #EEF0F4;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #0F172A;
    --text2: #475569;
    --text3: #94A3B8;
    --navy: #1B2A4A;
    --navy2: #243558;
    --navy3: #0F1E36;
    --gold: #D4961A;
    --gold2: #F0AE20;
    --gold-bg: #FEF3DC;
    --gold-text: #7A4F08;
    --accent: #1B2A4A;
    --success: #0F6E56;
    --success-bg: #E1F5EE;
    --success-text: #04342C;
    --warn: #B45309;
    --warn-bg: #FAEEDA;
    --warn-text: #412402;
    --danger: #991B1B;
    --danger-bg: #FEE2E2;
    --danger-text: #7F1D1D;
    --critical-bg: #1B2A4A;
    --critical-text: #F0AE20;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  }
  body.dark-mode {
    --bg: #0F1623;
    --surface: #1A2236;
    --surface2: #222D42;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #F1F5F9;
    --text2: #94A3B8;
    --text3: #64748B;
    --navy: #0F1623;
    --navy2: #1A2236;
    --navy3: #0A0F1A;
    --gold: #D4961A;
    --gold2: #F0AE20;
    --gold-bg: rgba(212,150,26,0.15);
    --gold-text: #F0AE20;
    --success-bg: rgba(15,110,86,0.2);
    --warn-bg: rgba(180,83,9,0.2);
    --danger-bg: rgba(153,27,27,0.2);
  }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  .nav {
    background: var(--navy);
    padding: 0 24px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    white-space: nowrap;
  }
  @media (max-width: 400px) {
    .nav-center { display: none; }
  }
  .nav-logo {
    font-size: 1.1rem;
    font-weight: 700;
    color: #F1F5F9;
    letter-spacing: 0.5px;
  }
  .nav-logo span { color: var(--gold2); }
  .nav-back {
    display: flex; align-items: center; gap: 6px;
    color: #94A3B8; font-size: 13px; cursor: pointer;
    padding: 4px 8px; border-radius: var(--radius-sm);
    transition: background 0.15s;
  }
  .nav-back:hover { background: rgba(255,255,255,0.08); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .sync-indicator {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: #9FE1CB;
  }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #1D9E75;
    transition: background 0.3s;
  }
  .sync-dot.offline { background: #EF9F27; }

  /* MAIN LAYOUT */
  .main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
  @media (max-width: 600px) {
    .main { padding: 12px 10px; }
    .kachel-grid { grid-template-columns: 1fr; gap: 8px; }
    .kachel { padding: 16px 14px; }
    .kachel i { font-size: 24px; }
    .kachel-label { font-size: 13px; word-break: break-word; }
    .kachel-sub { font-size: 11px; word-break: break-word; }
    .projekt-info { padding: 14px 16px; flex-direction: column; gap: 8px; }
    .projekt-info-title { font-size: 1rem; }
    .projekt-info-meta { font-size: 11px; line-height: 1.6; }
    .page-title { font-size: 1.2rem; }
    .filter-row { gap: 6px; }
    .filter-row > div:last-child { width: 100%; justify-content: flex-end; }
    .status-tabs { gap: 5px; }
    .status-tab { padding: 4px 9px; font-size: 11px; }
    .btn-row { flex-wrap: wrap; }
    .nav { padding: 0 14px; }
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .card-sm { padding: 14px 18px; }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 14px;
  }

  /* PROJECT GRID */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 20px;
  }
  @media (max-width: 600px) {
    .project-grid { grid-template-columns: 1fr; gap: 10px; margin-top: 12px; }
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
    box-shadow: var(--shadow);
  }
  .project-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
    border-color: var(--gold);
  }
  .project-card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
  .project-card-sub { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .project-card-new {
    border: 2px dashed var(--border2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: var(--text3);
    font-size: 13px; min-height: 120px;
    background: transparent;
  }
  .project-card-new:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.03); }

  /* KACHELN */
  .kachel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .kachel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
    box-shadow: var(--shadow);
    word-break: break-word;
  }
  .kachel:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--gold); }
  .kachel i { font-size: 26px; display: block; margin-bottom: 10px; color: var(--navy); }
  .kachel-label { font-size: 13px; font-weight: 500; color: var(--text); }
  .kachel-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* PROJEKT INFO BOX */
  .projekt-info {
    background: linear-gradient(135deg, var(--navy3) 0%, var(--navy2) 100%);
    border-bottom: 3px solid var(--gold);
    color: white;
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .projekt-info-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  .projekt-info-meta { font-size: 12px; opacity: 0.75; }

  /* BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-entwurf { background: var(--warn-bg); color: var(--warn); }
  .badge-aktiv { background: var(--success-bg); color: var(--success); }
  .badge-abgeschlossen { background: var(--surface2); color: var(--text2); }
  .badge-gering { background: #DCFCE7; color: #166534; }
  .badge-mittel { background: var(--warn-bg); color: var(--warn); }
  .badge-hoch { background: var(--danger-bg); color: var(--danger); }
  .badge-kritisch { background: var(--critical-bg); color: var(--critical-text); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    transition: background 0.15s, box-shadow 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--navy); color: white; border-color: var(--navy); }
  .btn-primary:hover { background: var(--navy2); }
  .btn-success { background: var(--success); color: white; border-color: var(--success); }
  .btn-success:hover { background: #085041; }
  .btn-gold { background: var(--gold); color: white; border-color: var(--gold); }
  .btn-gold:hover { background: var(--gold2); }
  .btn-report { background: var(--navy); color: white; border-color: var(--navy); }
  .btn-report:hover { background: var(--navy2); }
  .btn-dimmed { opacity: 0.38; cursor: default; pointer-events: none; }
  .btn-dimmed-active { opacity: 1; cursor: pointer; pointer-events: auto; }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
  .btn-ai {
    background: linear-gradient(135deg, #2D3A5C, #1C2333);
    color: white; border: none;
    padding: 9px 18px;
  }
  .btn-ai:hover { background: linear-gradient(135deg, #1C2333, #0F172A); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

  /* INPUTS */
  .input, .textarea, .select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .input:focus, .textarea:focus, .select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  .textarea { resize: vertical; min-height: 80px; }
  .label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 5px;
    display: block;
  }
  .field { margin-bottom: 12px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 600px) { .field-row-3 { grid-template-columns: 1fr; } }

  /* INPUT TABS */
  .input-tabs { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
  .input-tab {
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .input-tab.active { color: var(--text); border-bottom-color: var(--navy); font-weight: 500; }
  .input-tab:hover { color: var(--text2); }

  /* AUDIO */
  .audio-recorder {
    border: 1px dashed var(--border2);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
    margin-bottom: 8px;
  }
  .recording-active { border-color: #E24B4A; background: #FEF2F2; }
  .audio-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .audio-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 6px 10px; font-size: 12px;
  }

  /* FILE LIST */
  .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .file-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 6px 10px; font-size: 12px;
  }
  .file-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; }

  /* GENERATED RESULT */
  .result-box {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: 16px;
  }
  .result-header {
    background: var(--surface2);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .result-field {
    display: flex;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .result-field:last-child { border-bottom: none; }
  .result-label { width: 160px; min-width: 160px; font-size: 12px; font-weight: 500; color: var(--text2); padding-top: 2px; }
  .result-value { flex: 1; font-size: 14px; color: var(--text); }
  @media (max-width: 600px) {
    .result-field { flex-direction: column; gap: 3px; padding: 8px 12px; }
    .result-label { width: 100%; min-width: unset; }
    .result-input { width: 100%; }
  }
  .result-input {
    flex: 1; font-size: 14px; color: var(--text);
    border: none; outline: none; background: transparent;
    font-family: 'Inter', sans-serif;
    padding: 0; resize: none; min-height: 24px;
  }
  .result-input:focus { background: rgba(59,130,246,0.04); border-radius: 3px; }

  /* MULTI ENTRY */
  .multi-entry {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .multi-entry-header {
    background: var(--surface2);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .entry-num {
    font-size: 11px; font-weight: 600;
    background: var(--navy); color: white;
    padding: 2px 9px; border-radius: 20px;
  }
  .multi-entry-body { padding: 14px 16px; }

  /* MANGEL LIST */
  .mangel-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .mangel-item:last-child { border-bottom: none; }
  .mangel-item:hover { background: var(--surface2); margin: 0 -24px; padding: 11px 24px; border-radius: var(--radius-sm); }
  .mangel-nr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text3);
    min-width: 28px;
  }
  .mangel-info { flex: 1; min-width: 0; }
  .mangel-title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mangel-meta { font-size: 11px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mangel-badges { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
  @media (max-width: 600px) {
    .mangel-item { padding: 10px 0; gap: 8px; flex-wrap: nowrap; }
    .mangel-title { font-size: 13px; white-space: normal; }
    .mangel-meta { white-space: normal; font-size: 10px; }
    .mangel-nr { min-width: 22px; font-size: 10px; }
    .mangel-badges { flex-direction: column; gap: 3px; align-items: flex-end; }
    .badge { font-size: 10px; padding: 2px 7px; }
    .card { padding: 0 14px; }
  }

  /* STATUS TABS */
  .status-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .status-tab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
  }
  .status-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

  /* FILTER ROW */
  .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-row .input { max-width: 200px; }

  /* LOADING */
  .loading {
    display: flex; align-items: center; gap: 10px;
    padding: 16px; color: var(--text2); font-size: 14px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border2);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%; max-width: 480px;
    box-shadow: var(--shadow-md);
    max-height: 90vh;
    overflow-y: auto;
  }
  @media (max-width: 600px) {
    .modal-backdrop { padding: 10px; align-items: flex-end; }
    .modal { border-radius: var(--radius) var(--radius) 0 0; max-height: 92vh; }
  }
  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 1rem; font-weight: 600; }
  .modal-body { padding: 18px 22px; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  /* TOAST */
  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--navy); color: white;
    padding: 10px 16px; border-radius: var(--radius-sm);
    font-size: 13px; box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 8px;
    animation: slideIn 0.2s ease;
  }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* TIMESTAMP */
  .timestamp { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }

  /* DIVIDER */
  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* REPORT */
  .report-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-top: 16px; }
  .report-format-btn { flex: 1; padding: 14px; border: 1px solid var(--border2); border-radius: var(--radius); cursor: pointer; text-align: center; transition: all 0.15s; background: var(--surface); }
  .report-format-btn:hover { border-color: var(--gold); background: var(--gold-bg); }
  .report-format-btn.selected { border-color: var(--gold); background: var(--gold-bg); }
  .report-format-btn i { font-size: 24px; display: block; margin-bottom: 6px; color: var(--navy); }
  .report-format-btn span { font-size: 13px; font-weight: 500; }
  .report-output { white-space: pre-wrap; font-size: 13px; line-height: 1.7; color: var(--text); font-family: 'Inter', sans-serif; }

  /* BURGER MENU */
  .burger-menu { position: relative; }
  .burger-btn {
    background: none; border: none; cursor: pointer;
    color: #94A3B8; font-size: 20px;
    padding: 4px 6px; border-radius: var(--radius-sm);
    transition: background 0.15s;
    display: flex; align-items: center;
  }
  .burger-btn:hover { background: rgba(255,255,255,0.08); }
  .burger-dropdown {
    position: absolute; right: 0; top: 110%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    min-width: 200px;
    z-index: 200;
    overflow: hidden;
  }
  .burger-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px;
    font-size: 13px; color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
    border-bottom: 1px solid var(--border);
  }
  .burger-item:last-child { border-bottom: none; }
  .burger-item:hover { background: var(--surface2); }
  .burger-item i { font-size: 16px; color: var(--text3); }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const GROQ_API_KEY = localStorage.getItem('sv_groq_key') || ''; // ← hier eintragen
const GROQ_MODEL = "llama-3.3-70b-versatile";

// ── STORAGE ───────────────────────────────────────────────────────────────────
const Storage = {
  get: (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
};

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `Du bist ein erfahrener KI-Assistent für Bausachverständige. Wandle formlose Eingaben in strukturierte Mängelprotokoll-Einträge um.

Antworte NUR mit validem JSON, kein Markdown, keine Erklärungen:
{"geschoss":"KG/EG/OG/DG/FA/AA","raum_bauteil":"Bezeichnung","gewerk":"Gewerk","schadensart":"Schadensart","mangelbeschreibung":"Vollständige fachliche Beschreibung inkl. Lage, Ausmaß, mögliche Ursache","schweregrad":"Gering/Mittel/Hoch/Kritisch","empfohlene_massnahme":"Konkrete Handlungsempfehlung mit Normbezug wo passend","geschaetzte_kosten_netto":"z.B. 200-500","dringlichkeit":"Sofort/< 4 Wochen/< 3 Monate/< 6 Monate"}

Schweregrade: Gering=optischer Mangel, Mittel=Funktionseinschränkung möglich, Hoch=Folgeschäden drohen, Kritisch=Sicherheitsrisiko.

Beispiele:
Eingabe: "Riss Außenputz Nordseite EG diagonal 3mm vom Fenstersturz"
Ausgabe: {"geschoss":"EG","raum_bauteil":"Außenwand / Fassade Nordseite","gewerk":"Putz / Fassade","schadensart":"Rissbildung","mangelbeschreibung":"Diagonaler Riss im Außenputz, Nordfassade EG, Breite ca. 3 mm, verläuft vom Fenstersturz nach unten. Ursache vermutlich Setzung des Bauwerks.","schweregrad":"Mittel","empfohlene_massnahme":"Statische Prüfung zur Ursachenklärung, Rissbeobachtung mind. 3 Monate, anschließend fachgerechte Verpressung und Überputzung.","geschaetzte_kosten_netto":"350-600","dringlichkeit":"< 3 Monate"}

Eingabe: "Bad OG Silikonfuge Badewanne komplett gerissen Wassereintritt möglich"
Ausgabe: {"geschoss":"OG","raum_bauteil":"Bad / Nassbereich","gewerk":"Fliesenleger / Sanitär","schadensart":"Gerissene Silikonfuge","mangelbeschreibung":"Silikonfuge entlang der Badewannenunterkante vollständig gerissen. Akute Wassereintrittsgefahr in darunterliegenden Bereich.","schweregrad":"Hoch","empfohlene_massnahme":"Alte Silikonfuge vollständig entfernen, Untergrund reinigen und trocknen, neue schimmelresistente Sanitärsilikonfuge fachgerecht einbringen.","geschaetzte_kosten_netto":"80-150","dringlichkeit":"< 4 Wochen"}

Eingabe: "Treppengeländer wackelt Befestigung locker Brüstungshöhe wirkt zu niedrig"
Ausgabe: {"geschoss":"EG/OG","raum_bauteil":"Treppenhaus / Geländer","gewerk":"Metallbau / Treppenbau","schadensart":"Sicherheitsmangel – Geländerbefestigung","mangelbeschreibung":"Treppengeländer instabil, Fußbefestigung gelockert. Brüstungshöhe möglicherweise unter DIN 18065 Mindestmaß von 90 cm. Akutes Sicherheitsrisiko.","schweregrad":"Kritisch","empfohlene_massnahme":"Sofortige Sicherung der Geländerbefestigung. Brüstungshöhe ausmessen, bei Unterschreitung unverzügliche Nachbesserung. Nutzungseinschränkung bis Behebung.","geschaetzte_kosten_netto":"300-1600","dringlichkeit":"Sofort"}`;

// ── BERICHT PROMPTS ──────────────────────────────────────────────────────────
const BERICHT_PROMPT_FLIESSTEXT = `Du bist ein erfahrener Bausachverständiger. Erstelle auf Basis der folgenden Mängelliste einen professionellen Gutachtenbericht als strukturierten Fließtext.

WICHTIG: Verwende zwingend Markdown-Überschriften zur Strukturierung:
- # für Hauptabschnitte (z.B. # 1. Einleitung)
- ## für Unterabschnitte (z.B. ## Kritische Mängel)
- ### für einzelne Mängel oder Unterpunkte

Struktur:
# 1. Einleitung
Kurze Beschreibung von Begehungszweck, Datum und Objekt.

# 2. Festgestellte Mängel
Mängel nach Schweregrad geordnet (Kritisch zuerst, dann Hoch, Mittel, Gering).
Für jeden Schweregrad eine ## Unterüberschrift, für jeden einzelnen Mangel eine ### Überschrift.

# 3. Gesamtbewertung und Handlungsempfehlung
Zusammenfassende Bewertung des Gebäudezustands und priorisierte Handlungsempfehlung.

# 4. Kostenzusammenfassung
Aufstellung der geschätzten Kosten und Gesamtsumme.

Schreibe professionell, präzise und sachverständlich. Verwende Fachbegriffe korrekt.`;

const BERICHT_PROMPT_TABELLE = `Du bist ein erfahrener Bausachverständiger. Erstelle auf Basis der folgenden Mängelliste eine strukturierte tabellarische Mängelübersicht.

WICHTIG: Verwende ausschließlich # für alle Abschnittsüberschriften (keine ##). Kein einleitender Titel wie "Mängelübersicht" o.ä.

Struktur exakt so:

# Erfasste Mängel
Tabelle im folgenden Format:
| Nr. | Bauteil | Schadensart | Schweregrad | Dringlichkeit | Maßnahme | Kosten (netto) |
|-----|---------|-------------|-------------|---------------|----------|----------------|

# Gesamtanzahl Mängel nach Schweregrad
Auflistung mit - je Schweregrad.

# Gesamte geschätzte Kosten (netto)
Summe der Kosten.

# Priorisierte Handlungsempfehlung
2-3 Sätze zur priorisierten Vorgehensweise.`;

async function generateBericht(maengel, format, projektInfo) {
  const prompt = format === 'fliesstext' ? BERICHT_PROMPT_FLIESSTEXT : BERICHT_PROMPT_TABELLE;
  const mangelText = maengel.map((m, i) => `Mangel ${m.nr||i+1}: ${m.schadensart||'Entwurf'} | ${m.geschoss||''} ${m.raum_bauteil||''} | Schweregrad: ${m.schweregrad||'-'} | Dringlichkeit: ${m.dringlichkeit||'-'} | Beschreibung: ${m.mangelbeschreibung||'-'} | Maßnahme: ${m.empfohlene_massnahme||'-'} | Kosten: ${m.geschaetzte_kosten_netto||'-'} €`).join('\n');
  const userMsg = `Projekt: ${projektInfo.name}\nAdresse: ${projektInfo.adresse||'-'}\nSachverständiger: ${projektInfo.sachverstaendiger||'-'}\nDatum: ${new Date().toLocaleDateString('de-DE')}\n\nMängelliste:\n${mangelText}`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
    body: JSON.stringify({
      model: GROQ_MODEL,
      messages: [{ role: 'system', content: prompt }, { role: 'user', content: userMsg }],
      temperature: 0.3, max_tokens: 2000,
    })
  });
  if (!res.ok) throw new Error(`API Fehler: ${res.status}`);
  const data = await res.json();
  return data.choices[0].message.content.trim();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 10);
const now = () => new Date().toISOString();
const fmtDate = (iso) => new Date(iso).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
const fmtTime = (iso) => new Date(iso).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
const fmtDateTime = (iso) => `${fmtDate(iso)} ${fmtTime(iso)}`;

const SCHWEREGRAD_ORDER = { 'Kritisch': 0, 'Hoch': 1, 'Mittel': 2, 'Gering': 3 };

function BadgeSchweregrad({ grad }) {
  const cls = { Gering: 'badge-gering', Mittel: 'badge-mittel', Hoch: 'badge-hoch', Kritisch: 'badge-kritisch' };
  return <span className={`badge ${cls[grad] || 'badge-mittel'}`}>{grad}</span>;
}
function BadgeStatus({ status }) {
  const cls = { Entwurf: 'badge-entwurf', Aktiv: 'badge-aktiv', Abgeschlossen: 'badge-abgeschlossen' };
  return <span className={`badge ${cls[status] || 'badge-entwurf'}`}>{status}</span>;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type || ''}`}>
          <i className={`ti ${t.type === 'success' ? 'ti-check' : t.type === 'error' ? 'ti-x' : 'ti-info-circle'}`}></i>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ── INPUT BLOCK (Text + Audio + File) ─────────────────────────────────────────
function InputBlock({ value, onChange }) {
  const [activeTab, setActiveTab] = useState('text');
  const [recording, setRecording] = useState(false);
  const [audios, setAudios] = useState(value.audios || []);
  const [files, setFiles] = useState(value.files || []);
  const [texts, setTexts] = useState(value.texts || ['']);
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);

  const notify = useCallback((upd) => {
    onChange({ texts, audios, files, ...upd });
  }, [texts, audios, files, onChange]);

  const updateTexts = (newTexts) => { setTexts(newTexts); notify({ texts: newTexts }); };
  const updateAudios = (newAudios) => { setAudios(newAudios); notify({ audios: newAudios }); };
  const updateFiles = (newFiles) => { setFiles(newFiles); notify({ files: newFiles }); };

  const startRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      chunksRef.current = [];
      mr.ondataavailable = e => chunksRef.current.push(e.data);
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => {
          const newAudios = [...audios, { id: uid(), url: reader.result, name: `Aufnahme ${audios.length + 1}`, ts: now() }];
          updateAudios(newAudios);
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t => t.stop());
      };
      mr.start();
      mediaRef.current = mr;
      setRecording(true);
    } catch { alert('Mikrofon-Zugriff verweigert'); }
  };

  const stopRecording = () => {
    if (mediaRef.current) { mediaRef.current.stop(); setRecording(false); }
  };

  const handleFiles = (e) => {
    Array.from(e.target.files).forEach(f => {
      const reader = new FileReader();
      reader.onload = () => {
        setFiles(prev => {
          const newFiles = [...prev, { id: uid(), name: f.name, type: f.type, url: reader.result, size: f.size }];
          onChange({ texts, audios, files: newFiles });
          return newFiles;
        });
      };
      reader.readAsDataURL(f);
    });
  };

  return (
    <div>
      <div className="input-tabs">
        {[['text','ti-text','Text'],['audio','ti-microphone','Sprache'],['file','ti-paperclip','Dateien']].map(([tab, icon, label]) => (
          <div key={tab} className={`input-tab ${activeTab === tab ? 'active' : ''}`} onClick={() => setActiveTab(tab)}>
            <i className={`ti ${icon}`}></i>{label}
            {tab === 'audio' && audios.length > 0 && <span className="badge badge-aktiv" style={{fontSize:'10px',padding:'1px 6px'}}>{audios.length}</span>}
            {tab === 'file' && files.length > 0 && <span className="badge badge-aktiv" style={{fontSize:'10px',padding:'1px 6px'}}>{files.length}</span>}
          </div>
        ))}
      </div>

      {activeTab === 'text' && (
        <div>
          {texts.map((t, i) => (
            <div key={i} style={{marginBottom:'8px', position:'relative'}}>
              <textarea className="textarea" placeholder={`Mangelbeschreibung ${texts.length > 1 ? i+1 : ''}...`}
                value={t} onChange={e => { const n=[...texts]; n[i]=e.target.value; updateTexts(n); }} />
              {texts.length > 1 && (
                <span style={{position:'absolute',top:'6px',right:'8px',cursor:'pointer',color:'var(--text3)',fontSize:'16px'}}
                  onClick={() => updateTexts(texts.filter((_,j)=>j!==i))}>
                  <i className="ti ti-x"></i>
                </span>
              )}
            </div>
          ))}
          <div className="add-input-btn" onClick={() => updateTexts([...texts, ''])}>
            <i className="ti ti-plus"></i> Weiteres Textfeld
          </div>
        </div>
      )}

      {activeTab === 'audio' && (
        <div>
          <div className={`audio-recorder ${recording ? 'recording-active' : ''}`}>
            {recording ? (
              <div style={{display:'flex',alignItems:'center',gap:'10px',justifyContent:'center'}}>
                <div style={{width:'10px',height:'10px',borderRadius:'50%',background:'#E24B4A',animation:'spin 1s linear infinite'}}></div>
                <span style={{fontSize:'13px',color:'#991B1B'}}>Aufnahme läuft...</span>
                <button className="btn btn-danger btn-sm" onClick={stopRecording}><i className="ti ti-player-stop"></i> Stop</button>
              </div>
            ) : (
              <button className="btn btn-primary btn-sm" onClick={startRecording}>
                <i className="ti ti-microphone"></i> Aufnahme starten
              </button>
            )}
          </div>
          {audios.length > 0 && (
            <div className="audio-list">
              {audios.map((a, i) => (
                <div key={a.id} className="audio-item">
                  <i className="ti ti-wave-sine" style={{color:'var(--accent)'}}></i>
                  <audio src={a.url} controls style={{flex:1,height:'28px'}}></audio>
                  <span style={{fontSize:'11px',color:'var(--text3)'}}>{fmtTime(a.ts)}</span>
                  <i className="ti ti-trash" style={{cursor:'pointer',color:'var(--text3)'}}
                    onClick={() => updateAudios(audios.filter(x=>x.id!==a.id))}></i>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {activeTab === 'file' && (
        <div>
          <label className="btn" style={{cursor:'pointer',display:'inline-flex'}}>
            <i className="ti ti-upload"></i> Foto / Datei hochladen
            <input type="file" multiple accept="image/*,.pdf" style={{display:'none'}} onChange={handleFiles} />
          </label>
          {files.length > 0 && (
            <div className="file-list">
              {files.map(f => (
                <div key={f.id} className="file-item">
                  {f.type.startsWith('image/') && <img src={f.url} alt="" className="file-thumb" />}
                  {!f.type.startsWith('image/') && <i className="ti ti-file" style={{fontSize:'20px',color:'var(--accent)'}}></i>}
                  <span style={{flex:1}}>{f.name}</span>
                  <i className="ti ti-trash" style={{cursor:'pointer',color:'var(--text3)'}}
                    onClick={() => updateFiles(files.filter(x=>x.id!==f.id))}></i>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── KI GENERIERUNG ────────────────────────────────────────────────────────────
async function generateProtokoll(inputData) {
  const parts = [];
  (inputData.texts || []).forEach(t => { if (t.trim()) parts.push(t.trim()); });
  (inputData.audios || []).forEach((a, i) => parts.push(`[Sprachaufnahme ${i+1}: Inhalt nicht automatisch transkribiert – bitte manuell ergänzen]`));
  (inputData.files || []).forEach(f => parts.push(`[Anhang: ${f.name}]`));
  const combined = parts.join('\n');
  if (!combined.trim()) throw new Error('Keine Eingabe vorhanden');

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
    body: JSON.stringify({
      model: GROQ_MODEL,
      messages: [{ role: 'system', content: SYSTEM_PROMPT }, { role: 'user', content: combined }],
      temperature: 0.2, max_tokens: 800,
    })
  });
  if (!res.ok) throw new Error(`API Fehler: ${res.status}`);
  const data = await res.json();
  const raw = data.choices[0].message.content.trim();
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Kein JSON in Antwort');
  return JSON.parse(match[0]);
}

// ── EINZELMANGEL DIALOG ───────────────────────────────────────────────────────
function EinzelmangelView({ projekt, onBack, onSave, addToast, darkMode, onToggleDark }) {
  const [inputData, setInputData] = useState({ texts: [''], audios: [], files: [] });
  const [generated, setGenerated] = useState(null);
  const [loading, setLoading] = useState(false);
  const [ts] = useState(now());

  const generate = async () => {
    setLoading(true);
    try {
      const result = await generateProtokoll(inputData);
      setGenerated(result);
      addToast('Protokolleintrag generiert', 'success');
    } catch (e) {
      addToast(`Fehler: ${e.message}`, 'error');
    }
    setLoading(false);
  };

  const updateField = (key, val) => setGenerated(g => ({ ...g, [key]: val }));

  const save = (status) => {
    const mangel = {
      id: uid(), projektId: projekt.id,
      status, timestamp: ts, updatedAt: now(),
      inputData,
      ...(generated || {}),
      nr: null,
    };
    onSave(mangel, status);
  };

  const EditableField = ({ label, field, multiline }) => (
    <div className="result-field">
