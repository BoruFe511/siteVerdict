      {multiline
        ? <textarea className="result-input" value={generated?.[field]||''} onChange={e=>updateField(field,e.target.value)} rows={3} />
        : <input className="result-input" value={generated?.[field]||''} onChange={e=>updateField(field,e.target.value)} />
      }
    </div>
  );

  return (
    <div>
      <div className="nav">
        <div className="nav-back" onClick={onBack}><i className="ti ti-arrow-left"></i> {projekt.name}</div>
        <div className="nav-center"><span className="nav-logo">Site<span>Verdict</span></span></div>
        <div className="nav-right">
          <div className="sync-indicator"><div className="sync-dot"></div></div>
          <BurgerMenu darkMode={darkMode} onToggleDark={onToggleDark} />
        </div>
      </div>
      <div className="main">
        <div className="page-header">
          <div className="page-title">Einzelmangel erfassen</div>
          <div className="timestamp"><i className="ti ti-clock"></i> Erfassung gestartet: {fmtDateTime(ts)}</div>
        </div>

        <div className="card">
          <div className="card-title">Eingabe</div>
          <InputBlock value={inputData} onChange={setInputData} />
          <div style={{marginTop:'14px'}}>
            <button className="btn btn-ai" onClick={generate} disabled={loading}>
              {loading ? <><div className="spinner"></div> KI generiert...</> : <><i className="ti ti-sparkles"></i> Protokolleintrag generieren</>}
            </button>
          </div>
        </div>

        {generated && (
          <div className="card">
            <div className="card-title">Generierter Protokolleintrag – direkt bearbeitbar</div>
            <div className="result-box">
              <div className="result-header">
                <span>Mängelbeschreibung</span>
                <BadgeSchweregrad grad={generated.schweregrad} />
              </div>
              <div className="field-row-3" style={{padding:'10px 16px', borderBottom:'1px solid var(--border)'}}>
                <div><div className="label">Geschoss</div><input className="input" value={generated.geschoss||''} onChange={e=>updateField('geschoss',e.target.value)} /></div>
                <div><div className="label">Raum / Bauteil</div><input className="input" value={generated.raum_bauteil||''} onChange={e=>updateField('raum_bauteil',e.target.value)} /></div>
                <div><div className="label">Gewerk</div><input className="input" value={generated.gewerk||''} onChange={e=>updateField('gewerk',e.target.value)} /></div>
              </div>
              <EditableField label="Schadensart" field="schadensart" />
              <EditableField label="Beschreibung" field="mangelbeschreibung" multiline />
              <div className="result-field">
                <div className="result-label">Schweregrad</div>
                <select className="select" style={{flex:1}} value={generated.schweregrad||'Mittel'} onChange={e=>updateField('schweregrad',e.target.value)}>
                  {['Gering','Mittel','Hoch','Kritisch'].map(g=><option key={g}>{g}</option>)}
                </select>
              </div>
              <EditableField label="Empfohlene Maßnahme" field="empfohlene_massnahme" multiline />
              <div className="result-field">
                <div className="result-label">Dringlichkeit</div>
                <select className="select" style={{flex:1}} value={generated.dringlichkeit||'< 3 Monate'} onChange={e=>updateField('dringlichkeit',e.target.value)}>
                  {['Sofort','< 4 Wochen','< 3 Monate','< 6 Monate'].map(d=><option key={d}>{d}</option>)}
                </select>
              </div>
              <div className="result-field">
                <div className="result-label">Kosten (netto)</div>
                <input className="result-input" value={generated.geschaetzte_kosten_netto||''} onChange={e=>updateField('geschaetzte_kosten_netto',e.target.value)} placeholder="z.B. 200-500 €" />
              </div>
            </div>
            <div className="btn-row">
              <button className="btn" onClick={onBack}><i className="ti ti-x"></i> Abbrechen</button>
              <button className="btn" onClick={()=>save('Entwurf')}><i className="ti ti-device-floppy"></i> Entwurf speichern</button>
              <button className="btn btn-gold" onClick={()=>save('Aktiv')}><i className="ti ti-device-floppy"></i> Speichern</button>
            </div>
          </div>
        )}
        {!generated && (
          <div className="btn-row">
            <button className="btn" onClick={onBack}><i className="ti ti-x"></i> Abbrechen</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── SAMMELMANGEL DIALOG ───────────────────────────────────────────────────────
function SammelmangelView({ projekt, onBack, onSave, addToast, darkMode, onToggleDark }) {
  const [sammelName, setSammelName] = useState('');
  const [ts] = useState(now());
  const [entries, setEntries] = useState([{ id: uid(), inputData: { texts: [''], audios: [], files: [] } }]);

  const addEntry = () => setEntries(e => [...e, { id: uid(), inputData: { texts: [''], audios: [], files: [] } }]);
  const removeEntry = (id) => setEntries(e => e.filter(x => x.id !== id));
  const updateEntry = (id, inputData) => setEntries(e => e.map(x => x.id === id ? { ...x, inputData } : x));

  const save = () => {
    const maengel = entries.map((e, i) => ({
      id: uid(), projektId: projekt.id,
      status: 'Entwurf',
      timestamp: ts, updatedAt: now(),
      sammelName: sammelName || `Sammlung ${fmtDate(ts)}`,
      sammelIndex: i + 1,
      inputData: e.inputData,
      nr: null,
    }));
    onSave(maengel);
    addToast(`${maengel.length} Einträge als Entwurf gespeichert`, 'success');
    onBack();
  };

  return (
    <div>
      <div className="nav">
        <div className="nav-back" onClick={onBack}><i className="ti ti-arrow-left"></i> {projekt.name}</div>
        <div className="nav-center"><span className="nav-logo">Site<span>Verdict</span></span></div>
        <div className="nav-right">
          <div className="sync-indicator"><div className="sync-dot offline"></div></div>
          <BurgerMenu darkMode={darkMode} onToggleDark={onToggleDark} />
        </div>
      </div>
      <div className="main">
        <div className="page-header">
          <div className="page-title">Sammelmangel erfassen</div>
          <div className="timestamp"><i className="ti ti-clock"></i> Gestartet: {fmtDateTime(ts)}</div>
        </div>

        <div className="card card-sm">
          <div className="field">
            <label className="label">Name der Sammlung (optional)</label>
            <input className="input" placeholder={`z.B. Begehung EG ${fmtDate(ts)}`} value={sammelName} onChange={e=>setSammelName(e.target.value)} />
          </div>
        </div>

        {entries.map((entry, i) => (
          <div key={entry.id} className="multi-entry">
            <div className="multi-entry-header">
              <span className="entry-num">Eintrag {i + 1}</span>
              {entries.length > 1 && (
                <button className="btn btn-sm" onClick={() => removeEntry(entry.id)}>
                  <i className="ti ti-trash"></i> Entfernen
                </button>
              )}
            </div>
            <div className="multi-entry-body">
              <InputBlock value={entry.inputData} onChange={(d) => updateEntry(entry.id, d)} />
            </div>
          </div>
        ))}

        <button className="btn" style={{width:'100%',justifyContent:'center',marginBottom:'16px'}} onClick={addEntry}>
          <i className="ti ti-plus"></i> Eintrag hinzufügen
        </button>

        <div className="btn-row">
          <button className="btn" onClick={onBack}><i className="ti ti-x"></i> Abbrechen</button>
          <button className="btn btn-success" onClick={save}>
            <i className="ti ti-device-floppy"></i> Als Entwurf speichern ({entries.length} Einträge)
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MÄNGELLISTE ───────────────────────────────────────────────────────────────
function MaengellisteView({ projekt, maengel, onBack, onUpdate, onDelete, addToast, darkMode, onToggleDark }) {
  const [statusFilter, setStatusFilter] = useState('Alle');
  const [sortDir, setSortDir] = useState('desc');
  const [selected, setSelected] = useState([]);
  const [editingId, setEditingId] = useState(null);
  const [processingId, setProcessingId] = useState(null);
  const [editingMangel, setEditingMangel] = useState(null);
  const [showBerichtModal, setShowBerichtModal] = useState(false);
  const [berichtFormat, setBerichtFormat] = useState(null);
  const [berichtLoading, setBerichtLoading] = useState(false);
  const [berichtText, setBerichtText] = useState('');

  const projektMaengel = maengel.filter(m => m.projektId === projekt.id);
  const filtered = projektMaengel
    .filter(m => statusFilter === 'Alle' || m.status === statusFilter)
    .sort((a, b) => sortDir === 'desc'
      ? new Date(b.timestamp) - new Date(a.timestamp)
      : new Date(a.timestamp) - new Date(b.timestamp));

  const counts = { Alle: projektMaengel.length, Entwurf: 0, Aktiv: 0, Abgeschlossen: 0 };
  projektMaengel.forEach(m => counts[m.status] = (counts[m.status] || 0) + 1);

  const toggleSelect = (id) => setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);

  const processEntwurf = async (mangel) => {
    setProcessingId(mangel.id);
    try {
      const result = await generateProtokoll(mangel.inputData);
      const nextNr = Math.max(0, ...projektMaengel.filter(m=>m.nr).map(m=>parseInt(m.nr)||0)) + 1;
      onUpdate({ ...mangel, ...result, status: 'Aktiv', nr: String(nextNr).padStart(3,'0'), updatedAt: now() });
      addToast('Eintrag protokolliert', 'success');
    } catch (e) { addToast(`Fehler: ${e.message}`, 'error'); }
    setProcessingId(null);
  };

  const processAllEntwuerfe = async () => {
    const entwuerfe = filtered.filter(m => m.status === 'Entwurf' && selected.includes(m.id));
    if (!entwuerfe.length) { addToast('Keine Entwürfe ausgewählt', ''); return; }
    for (const m of entwuerfe) await processEntwurf(m);
    setSelected([]);
  };

  const exportSelected = () => {
    const data = filtered.filter(m => selected.includes(m.id));
    if (!data.length) { addToast('Bitte Einträge auswählen', ''); return; }
    const json = JSON.stringify({ projekt, maengel: data, exportiert: now() }, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `${projekt.name.replace(/\s/g,'_')}_maengel.json`; a.click();
    addToast('Export abgeschlossen', 'success');
  };

  const exportPDF = () => {
    const data = selected.length ? filtered.filter(m=>selected.includes(m.id)) : filtered;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const pW = doc.internal.pageSize.getWidth();
    const pH = doc.internal.pageSize.getHeight();
    const ml = 18, mr = 18, maxW = pW - ml - mr;
    let y = 18;

    const checkPage = (need) => { if (y + need > pH - 18) { doc.addPage(); y = 18; } };

    const drawField = (label, value, opts={}) => {
      const labelW = 52;
      const valueW = maxW - labelW;
      doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(80);
      doc.text(label, ml, y);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0);
      const wrapped = doc.splitTextToSize(value||'-', valueW);
      doc.text(wrapped, ml + labelW, y);
      const rowH = Math.max(5.5, wrapped.length * 5.2);
      y += rowH;
    };

    // ── HEADER ────────────────────────────────────────────────────────────────
    doc.setFillColor(27,42,74);
    doc.rect(0, 0, pW, 22, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(255,255,255);
    doc.text('SiteVerdict – Mängelprotokoll', ml, 14);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(180,200,220);
    doc.text(`${projekt.name}   ·   ${projekt.adresse||''}   ·   SV: ${projekt.sachverstaendiger||'-'}   ·   ${fmtDateTime(now())}`, ml, 19);
    doc.setTextColor(0);
    y = 30;

    // ── MÄNGEL ────────────────────────────────────────────────────────────────
    data.forEach((m, i) => {
      const blockH = 72;
      checkPage(blockH);

      // Mangel-Header Bar
      const sgColors = { Kritisch:[220,38,38], Hoch:[234,88,12], Mittel:[180,83,9], Gering:[22,101,52] };
      const [r,g,b] = sgColors[m.schweregrad] || [100,100,100];
      doc.setFillColor(r,g,b);
      doc.rect(ml, y, 4, 28, 'F');

      doc.setFillColor(245,247,250);
      doc.rect(ml+4, y, maxW-4, 28, 'F');
      doc.setDrawColor(220,224,230);
      doc.rect(ml+4, y, maxW-4, 28, 'S');

      doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(27,42,74);
      doc.text(`Mangel ${m.nr||'E'+(i+1)}`, ml+10, y+8);
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(0);
      doc.text(m.schadensart||'Entwurf – noch nicht protokolliert', ml+10, y+15);

      // Status + Schweregrad badges inline
      doc.setFontSize(8); doc.setFont('helvetica','bold');
      doc.setTextColor(r,g,b);
      doc.text(`[${m.schweregrad||'-'}]`, ml+10, y+23);
      doc.setTextColor(100); doc.setFont('helvetica','normal');
      doc.text(`${m.status||'-'}   ·   ${fmtDateTime(m.timestamp)}`, ml+50, y+23);
      y += 32;

      // Detail fields
      doc.setTextColor(0);
      const fields = [
        ['Geschoss / Bauteil', `${m.geschoss||'-'}  ·  ${m.raum_bauteil||'-'}`],
        ['Gewerk',             m.gewerk||'-'],
        ['Schweregrad',        `${m.schweregrad||'-'}  ·  Dringlichkeit: ${m.dringlichkeit||'-'}`],
        ['Beschreibung',       m.mangelbeschreibung||'-'],
        ['Empf. Maßnahme',     m.empfohlene_massnahme||'-'],
        ['Kosten (netto)',     m.geschaetzte_kosten_netto ? `ca. ${m.geschaetzte_kosten_netto} €` : '-'],
      ];

      fields.forEach(([label, value], fi) => {
        const labelW = 52;
        const valueW = maxW - labelW - 4;
        const wrapped = doc.splitTextToSize(value, valueW);
        const rowH = Math.max(6, wrapped.length * 5.2) + 2;
        checkPage(rowH + 2);

        if (fi % 2 === 0) {
          doc.setFillColor(250,251,253);
          doc.rect(ml, y-1, maxW, rowH, 'F');
        }
        doc.setDrawColor(230,233,238);
        doc.line(ml, y + rowH - 1, ml + maxW, y + rowH - 1);

        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(90,100,120);
        doc.text(label, ml+3, y+4);
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0);
        doc.text(wrapped, ml+labelW, y+4);
        y += rowH;
      });

      y += 10;
    });

    // ── FOOTER ────────────────────────────────────────────────────────────────
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFillColor(27,42,74);
      doc.rect(0, pH-10, pW, 10, 'F');
      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(180,200,220);
      doc.text(`SiteVerdict · ${projekt.name} · Seite ${p} von ${totalPages}`, ml, pH-4);
    }

    doc.save(`${projekt.name.replace(/\s/g,'_')}_maengel.pdf`);
    addToast('PDF exportiert', 'success');
  };

  const openBericht = () => {
    const basis = selected.length
      ? filtered.filter(m => selected.includes(m.id) && m.status !== 'Entwurf')
      : filtered.filter(m => m.status !== 'Entwurf');
    if (!basis.length) { addToast('Keine protokollierten Mängel für Bericht vorhanden', ''); return; }
    setBerichtText('');
    setBerichtFormat(null);
    setShowBerichtModal(true);
  };

  const startBericht = async () => {
    const basis = selected.length
      ? filtered.filter(m => selected.includes(m.id) && m.status !== 'Entwurf')
      : filtered.filter(m => m.status !== 'Entwurf');
    setBerichtLoading(true);
    try {
      const text = await generateBericht(basis, berichtFormat, projekt);
      setBerichtText(text);
    } catch (e) { addToast(`Fehler: ${e.message}`, 'error'); }
    setBerichtLoading(false);
  };

  const exportBerichtTxt = () => {
    const blob = new Blob([berichtText], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${projekt.name.replace(/\s/g,'_')}_Bericht.${berichtFormat==='tabelle'?'md':'txt'}`;
    a.click();
    addToast('Bericht als TXT exportiert', 'success');
  };

  const exportBerichtPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const pW = doc.internal.pageSize.getWidth();
    const pH = doc.internal.pageSize.getHeight();
    const ml = 18, mr = 18, maxW = pW - ml - mr;
    let y = 18;

    const checkPage = (need) => { if (y + need > pH - 18) { doc.addPage(); y = 18; } };

    // Navy header
    doc.setFillColor(27,42,74);
    doc.rect(0, 0, pW, 22, 'F');
    const berichtTitel = berichtFormat === 'tabelle' ? 'SiteVerdict – Tabellarische Mängelübersicht' : 'SiteVerdict – Gutachtenbericht';
    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(255,255,255);
    doc.text(berichtTitel, ml, 14);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(180,200,220);
    const headerMeta = `${projekt.name}   ·   ${projekt.adresse||''}   ·   SV: ${projekt.sachverstaendiger||'-'}   ·   ${fmtDateTime(now())}`;
    doc.text(headerMeta, ml, 19);
    doc.setTextColor(0);
    y = 32;

    const lines = berichtText.split('\n');
    const isTableLine = l => l.trim().startsWith('|');
    const isSeparator = l => /^\|[-\s|:]+\|$/.test(l.trim());

    let i = 0;
    while (i < lines.length) {
      const line = lines[i];

      if (/^#{1,3} /.test(line)) {
        const lvl = line.startsWith('# ') ? 1 : line.startsWith('## ') ? 2 : 3;
        const text = line.replace(/^#{1,3} /, '');
        if (lvl === 1) {
          y += 4; // breathing room before section
          checkPage(18);
          // Full-width navy band
          doc.setFillColor(27,42,74);
          doc.rect(ml-2, y, maxW+4, 11, 'F');
          doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(255,255,255);
          doc.text(text, ml+2, y+7.5);
          y += 16;
        } else if (lvl === 2) {
          y += 3;
          checkPage(14);
          // Light navy bg band
          doc.setFillColor(235,239,248);
          doc.rect(ml-2, y, maxW+4, 9, 'F');
          doc.setFillColor(27,42,74);
          doc.rect(ml-2, y, 4, 9, 'F');
          doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(27,42,74);
          const wrapped = doc.splitTextToSize(text, maxW-6);
          doc.text(wrapped, ml+5, y+6.5);
          y += wrapped.length*6 + 6;
        } else {
          y += 2;
          checkPage(12);
          // Subtle underline style
          doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(50,65,100);
          const wrapped = doc.splitTextToSize(text, maxW);
          doc.text(wrapped, ml, y+5);
          y += wrapped.length*5.5;
          doc.setDrawColor(180,190,210);
          doc.line(ml, y+1, ml+maxW*0.4, y+1);
          y += 5;
        }
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0);
        i++; continue;
      }

      if (isTableLine(line) && i+1 < lines.length && isSeparator(lines[i+1])) {
        const tableLines = [];
        let j = i;
        while (j < lines.length && isTableLine(lines[j])) {
          if (!isSeparator(lines[j])) {
            const cells = lines[j].split('|').slice(1,-1).map(c => c.trim());
            tableLines.push(cells);
          }
          j++;
        }
        if (tableLines.length > 0) {
          const headers = tableLines[0];
          const rows = tableLines.slice(1);
          const colCount = headers.length;
          const colWidths = headers.map((h, ci) => {
            if (ci === 0) return maxW * 0.05;
            if (ci === colCount-1) return maxW * 0.16;
            return (maxW * 0.79) / (colCount - 2);
          });
          const rowH = 7; const cellPad = 2;
          checkPage(rowH * 3);
          // Header row
          doc.setFillColor(27,42,74); doc.setTextColor(255,255,255);
          doc.setFont('helvetica','bold'); doc.setFontSize(8);
          let x = ml;
          headers.forEach((h, ci) => {
            doc.rect(x, y, colWidths[ci], rowH, 'F');
            doc.text(h.substring(0,20), x+cellPad, y+rowH-cellPad);
            x += colWidths[ci];
          });
          y += rowH;
          // Data rows
          doc.setFont('helvetica','normal'); doc.setFontSize(8);
          rows.forEach((row, ri) => {
            let maxL = 1;
            row.forEach((cell, ci) => {
              const w = doc.splitTextToSize(cell||'', colWidths[ci]-cellPad*2);
              if (w.length > maxL) maxL = w.length;
            });
            const actualH = Math.max(rowH, maxL*4.5+cellPad*2);
            checkPage(actualH+2);
            x = ml;
            row.forEach((cell, ci) => {
              if (ri%2===0) { doc.setFillColor(245,247,250); } else { doc.setFillColor(255,255,255); }
              doc.setDrawColor(210,215,225);
              doc.rect(x, y, colWidths[ci], actualH, 'FD');
              doc.setTextColor(0); doc.setFontSize(8); doc.setFont('helvetica','normal');
              const wrapped = doc.splitTextToSize(cell||'', colWidths[ci]-cellPad*2);
              doc.text(wrapped, x+cellPad, y+4.5);
              x += colWidths[ci];
            });
            y += actualH;
          });
          y += 6;
        }
        i = j; continue;
      }

      if (line.trim() === '') { y += 3; i++; continue; }

      if (/^[*-] /.test(line.trim())) {
        checkPage(6);
        const text = '- ' + line.trim().replace(/^[*-] /,'').replace(/\*\*/g,'');
        doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(0);
        const wrapped = doc.splitTextToSize(text, maxW-6);
        doc.text(wrapped, ml+4, y); y += wrapped.length*5;
        i++; continue;
      }

      checkPage(6);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0);
      const clean = line.replace(/\*\*/g,'');
      const wrapped = doc.splitTextToSize(clean, maxW);
      doc.text(wrapped, ml, y); y += wrapped.length*5;
      i++;
    }

    // Footer on all pages
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFillColor(27,42,74);
      doc.rect(0, pH-10, pW, 10, 'F');
      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(180,200,220);
      doc.text(`SiteVerdict   ·   ${projekt.name}   ·   Seite ${p} von ${totalPages}`, ml, pH-4);
    }

    doc.save(`${projekt.name.replace(/\s/g,'_')}_Bericht.pdf`);
    addToast('Bericht als PDF exportiert', 'success');
  };

  return (
    <div>
      <div className="nav">
        <div className="nav-back" onClick={onBack}><i className="ti ti-arrow-left"></i> {projekt.name}</div>
        <div className="nav-center"><span className="nav-logo">Site<span>Verdict</span></span></div>
        <div className="nav-right">
          <div className="sync-indicator"><div className="sync-dot"></div></div>
          <BurgerMenu darkMode={darkMode} onToggleDark={onToggleDark} />
        </div>
      </div>
      <div className="main">
        <div className="page-header">
          <div className="page-title">Mängelliste</div>
          <div className="page-sub">{projekt.name} · {projektMaengel.length} Mängel gesamt</div>
        </div>

        <div className="status-tabs">
          {['Alle','Entwurf','Aktiv','Abgeschlossen'].map(s => (
            <div key={s} className={`status-tab ${statusFilter===s?'active':''}`} onClick={()=>setStatusFilter(s)}>
              {s} ({counts[s]||0})
            </div>
          ))}
        </div>

        <div className="filter-row">
          <div className="sort-btn" onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')}>
            <i className={`ti ti-sort-${sortDir==='desc'?'descending':'ascending'}`}></i>
            Datum {sortDir==='desc'?'↓':'↑'}
          </div>
          {selected.length > 0 && (
            <span style={{fontSize:'12px',color:'var(--text2)'}}>{selected.length} ausgewählt</span>
          )}
          <div style={{marginLeft:'auto',display:'flex',gap:'6px',flexWrap:'wrap',justifyContent:'flex-end'}}>
            <button
              className={`btn btn-sm btn-success ${selected.length > 0 ? 'btn-dimmed-active' : 'btn-dimmed'}`}
              onClick={processAllEntwuerfe}
              style={{opacity: selected.length > 0 ? 1 : 0.35, cursor: selected.length > 0 ? 'pointer' : 'default'}}>
              <i className="ti ti-sparkles"></i> Protokollieren
            </button>
            <button className="btn btn-sm" onClick={exportSelected}>
              <i className="ti ti-download"></i> JSON
            </button>
            <button className="btn btn-sm" onClick={exportPDF}>
              <i className="ti ti-file-type-pdf"></i> PDF
            </button>
            <button
              className={`btn btn-sm btn-report`}
              style={{opacity: selected.length > 0 ? 1 : 0.35, cursor: selected.length > 0 ? 'pointer' : 'default'}}
              onClick={openBericht}>
              <i className="ti ti-file-report"></i> Bericht
            </button>
          </div>
        </div>

        {filtered.length === 0 && (
          <div className="empty">
            <i className="ti ti-clipboard-off"></i>
            <div className="empty-title">Keine Mängel gefunden</div>
            <div>Ändere den Filter oder erfasse neue Mängel</div>
          </div>
        )}

        <div className="card" style={{padding:'0 24px'}}>
          {filtered.map(m => (
            <div key={m.id}>
              <div className="mangel-item" onClick={()=>setEditingId(editingId===m.id?null:m.id)}>
                <input type="checkbox" checked={selected.includes(m.id)}
                  onChange={()=>toggleSelect(m.id)} onClick={e=>e.stopPropagation()} />
                <div className="mangel-nr">{m.nr || '–'}</div>
                <div className="mangel-info">
                  <div className="mangel-title">
                    {m.schadensart || (m.sammelName ? `${m.sammelName} · Eintrag ${m.sammelIndex}` : 'Entwurf')}
                  </div>
                  <div className="mangel-meta">
                    {m.geschoss && `${m.geschoss} · `}{m.raum_bauteil && `${m.raum_bauteil} · `}{fmtDateTime(m.timestamp)}
                  </div>
                </div>
                <div className="mangel-badges">
                  {m.schweregrad && <BadgeSchweregrad grad={m.schweregrad} />}
                  <BadgeStatus status={m.status} />
                </div>
                <i className={`ti ti-chevron-${editingId===m.id?'up':'down'}`} style={{color:'var(--text3)',flexShrink:0}}></i>
              </div>

              {editingId === m.id && (
                <div style={{padding:'14px 0 18px', borderTop:'1px solid var(--border)'}}>
                  {m.status === 'Entwurf' && !m.schadensart && (
                    <div style={{marginBottom:'12px'}}>
                      <button className="btn btn-ai btn-sm"
                        disabled={processingId===m.id}
                        onClick={()=>processEntwurf(m)}>
                        {processingId===m.id
                          ? <><div className="spinner"></div> KI generiert...</>
                          : <><i className="ti ti-sparkles"></i> Jetzt protokollieren</>}
                      </button>
                    </div>
                  )}
                  {m.mangelbeschreibung && (
                    <div style={{fontSize:'13px',marginBottom:'8px'}}>
                      <strong>Beschreibung:</strong> {m.mangelbeschreibung}
                    </div>
                  )}
                  {m.empfohlene_massnahme && (
                    <div style={{fontSize:'13px',marginBottom:'8px'}}>
                      <strong>Maßnahme:</strong> {m.empfohlene_massnahme}
                    </div>
                  )}
                  {m.geschaetzte_kosten_netto && (
                    <div style={{fontSize:'13px',marginBottom:'8px'}}>
                      <strong>Kosten (netto):</strong> ca. {m.geschaetzte_kosten_netto} €
                    </div>
                  )}
                  <div className="btn-row">
                    <button className="btn btn-sm btn-primary"
                      onClick={()=>setEditingMangel(m)}>
                      <i className="ti ti-edit"></i> Bearbeiten
                    </button>
                    {m.status !== 'Abgeschlossen' && (
                      <button className="btn btn-sm btn-success"
                        onClick={()=>{onUpdate({...m,status:'Abgeschlossen',updatedAt:now()});addToast('Als abgeschlossen markiert','success');}}>
                        <i className="ti ti-check"></i> Abschließen
                      </button>
                    )}
                    {m.status === 'Abgeschlossen' && (
                      <button className="btn btn-sm"
                        onClick={()=>{onUpdate({...m,status:'Aktiv',updatedAt:now()});addToast('Wieder aktiviert','');}}>
                        <i className="ti ti-refresh"></i> Reaktivieren
                      </button>
                    )}
                    <button className="btn btn-sm btn-danger"
                      onClick={()=>{if(confirm('Mangel löschen?')){onDelete(m.id);addToast('Gelöscht','');}}}>
                      <i className="ti ti-trash"></i> Löschen
                    </button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {editingMangel && (
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setEditingMangel(null);}}>
          <div className="modal" style={{maxWidth:'680px',width:'100%'}}>
            <div className="modal-header">
              <div className="modal-title"><i className="ti ti-edit" style={{marginRight:'8px'}}></i>Mangel bearbeiten</div>
              <i className="ti ti-x" style={{cursor:'pointer',color:'var(--text3)'}} onClick={()=>setEditingMangel(null)}></i>
            </div>
            <div className="modal-body" style={{maxHeight:'70vh',overflowY:'auto'}}>
              <div style={{marginBottom:'16px'}}>
                <div className="card-title">Eingaben</div>
                <InputBlock
                  value={editingMangel.inputData || {texts:[''],audios:[],files:[]}}
                  onChange={d => setEditingMangel(m => ({...m, inputData: d}))}
                />
              </div>
              {editingMangel.schadensart && (
                <div>
                  <div className="card-title">Protokolleintrag</div>
                  <div className="result-box">
                    <div className="result-header"><span>Felder – direkt bearbeitbar</span><BadgeSchweregrad grad={editingMangel.schweregrad} /></div>
                    <div className="field-row-3" style={{padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
                      <div><div className="label">Geschoss</div><input className="input" value={editingMangel.geschoss||''} onChange={e=>setEditingMangel(m=>({...m,geschoss:e.target.value}))}/></div>
                      <div><div className="label">Raum / Bauteil</div><input className="input" value={editingMangel.raum_bauteil||''} onChange={e=>setEditingMangel(m=>({...m,raum_bauteil:e.target.value}))}/></div>
                      <div><div className="label">Gewerk</div><input className="input" value={editingMangel.gewerk||''} onChange={e=>setEditingMangel(m=>({...m,gewerk:e.target.value}))}/></div>
                    </div>
                    <div className="result-field"><div className="result-label">Schadensart</div><input className="result-input" value={editingMangel.schadensart||''} onChange={e=>setEditingMangel(m=>({...m,schadensart:e.target.value}))}/></div>
                    <div className="result-field"><div className="result-label">Beschreibung</div><textarea className="result-input" rows={3} value={editingMangel.mangelbeschreibung||''} onChange={e=>setEditingMangel(m=>({...m,mangelbeschreibung:e.target.value}))}/></div>
                    <div className="result-field">
                      <div className="result-label">Schweregrad</div>
                      <select className="select" style={{flex:1}} value={editingMangel.schweregrad||'Mittel'} onChange={e=>setEditingMangel(m=>({...m,schweregrad:e.target.value}))}>
                        {['Gering','Mittel','Hoch','Kritisch'].map(g=><option key={g}>{g}</option>)}
                      </select>
                    </div>
                    <div className="result-field"><div className="result-label">Empf. Maßnahme</div><textarea className="result-input" rows={3} value={editingMangel.empfohlene_massnahme||''} onChange={e=>setEditingMangel(m=>({...m,empfohlene_massnahme:e.target.value}))}/></div>
                    <div className="result-field">
                      <div className="result-label">Dringlichkeit</div>
                      <select className="select" style={{flex:1}} value={editingMangel.dringlichkeit||'< 3 Monate'} onChange={e=>setEditingMangel(m=>({...m,dringlichkeit:e.target.value}))}>
                        {['Sofort','< 4 Wochen','< 3 Monate','< 6 Monate'].map(d=><option key={d}>{d}</option>)}
                      </select>
                    </div>
                    <div className="result-field"><div className="result-label">Kosten (netto)</div><input className="result-input" value={editingMangel.geschaetzte_kosten_netto||''} onChange={e=>setEditingMangel(m=>({...m,geschaetzte_kosten_netto:e.target.value}))}/></div>
                  </div>
                </div>
              )}
              {!editingMangel.schadensart && (
                <div style={{marginTop:'12px'}}>
                  <button className="btn btn-ai" onClick={async()=>{
                    try {
                      const result = await generateProtokoll(editingMangel.inputData);
                      setEditingMangel(m=>({...m,...result}));
                      addToast('KI-Protokoll generiert','success');
                    } catch(e){ addToast(`Fehler: ${e.message}`,'error'); }
                  }}><i className="ti ti-sparkles"></i> KI-Protokoll generieren</button>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn" onClick={()=>setEditingMangel(null)}>Abbrechen</button>
              <button className="btn" onClick={()=>{
                onUpdate({...editingMangel,status:'Entwurf',updatedAt:now()});
                setEditingMangel(null);
                addToast('Als Entwurf gespeichert','success');
              }}><i className="ti ti-device-floppy"></i> Entwurf speichern</button>
              <button className="btn btn-gold" onClick={()=>{
                const nextNr = editingMangel.nr || String(Math.max(0,...projektMaengel.filter(x=>x.nr).map(x=>parseInt(x.nr)||0))+1).padStart(3,'0');
                onUpdate({...editingMangel,status:'Aktiv',nr:nextNr,updatedAt:now()});
                setEditingMangel(null);
                addToast('Gespeichert','success');
              }}><i className="ti ti-device-floppy"></i> Speichern</button>
            </div>
          </div>
        </div>
      )}

      {showBerichtModal && (
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowBerichtModal(false);}}>
          <div className="modal" style={{maxWidth:'640px'}}>
            <div className="modal-header">
              <div className="modal-title"><i className="ti ti-file-report" style={{marginRight:'8px'}}></i>Bericht erstellen</div>
              <i className="ti ti-x" style={{cursor:'pointer',color:'var(--text3)'}} onClick={()=>setShowBerichtModal(false)}></i>
            </div>
            <div className="modal-body">
              {!berichtText && (
                <div>
                  <p style={{fontSize:'13px',color:'var(--text2)',marginBottom:'16px'}}>
                    Wähle das Format. Basis: {selected.length ? selected.length : filtered.filter(m=>m.status!=='Entwurf').length} protokollierte Mängel.
                  </p>
                  <div style={{display:'flex',gap:'12px',marginBottom:'16px'}}>
                    <div className={`report-format-btn ${berichtFormat==='fliesstext'?'selected':''}`}
                      onClick={()=>setBerichtFormat('fliesstext')}>
                      <i className="ti ti-align-left"></i>
                      <span>Gutachtenbericht</span>
                      <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}}>Professioneller Fließtext</div>
                    </div>
                    <div className={`report-format-btn ${berichtFormat==='tabelle'?'selected':''}`}
                      onClick={()=>setBerichtFormat('tabelle')}>
                      <i className="ti ti-table"></i>
                      <span>Tabellenübersicht</span>
                      <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}}>Strukturierte Tabelle + Bewertung</div>
                    </div>
                  </div>
                  {berichtLoading && (
                    <div className="loading"><div className="spinner"></div> KI erstellt Bericht...</div>
                  )}
                </div>
              )}
              {berichtText && (
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
                    <span style={{fontSize:'12px',fontWeight:'500',color:'var(--text2)'}}>Generierter Bericht</span>
                    <button className="btn btn-sm" onClick={()=>setBerichtText('')}><i className="ti ti-refresh"></i> Neu generieren</button>
                  </div>
                  <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'16px',maxHeight:'360px',overflowY:'auto'}}>
                    <pre className="report-output">{berichtText}</pre>
                  </div>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn" onClick={()=>setShowBerichtModal(false)}>Schließen</button>
              {!berichtText && (
                <button className="btn btn-report" onClick={startBericht} disabled={!berichtFormat||berichtLoading}>
                  <i className="ti ti-sparkles"></i> Bericht generieren
                </button>
              )}
              {berichtText && (
                <div style={{display:'flex',gap:'8px'}}>
                <button className="btn btn-sm" onClick={exportBerichtTxt}>
                  <i className="ti ti-download"></i> TXT
                </button>
                <button className="btn btn-sm btn-gold" onClick={exportBerichtPDF}>
                  <i className="ti ti-file-type-pdf"></i> PDF
                </button>
              </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PROJEKT DASHBOARD ─────────────────────────────────────────────────────────
function ProjektDashboard({ projekt, maengel, onBack, onSaveMangel, onSaveSammel, onUpdateMangel, onDeleteMangel, addToast, darkMode, onToggleDark }) {
  const [view, setView] = useState('dashboard');

  const projektMaengel = maengel.filter(m => m.projektId === projekt.id);
  const counts = { Entwurf: 0, Aktiv: 0, Abgeschlossen: 0 };
  projektMaengel.forEach(m => counts[m.status] = (counts[m.status]||0)+1);

  const handleSaveSingle = (mangel, status) => {
    const nextNr = status === 'Aktiv'
      ? String(Math.max(0,...projektMaengel.filter(m=>m.nr).map(m=>parseInt(m.nr)||0))+1).padStart(3,'0')
      : null;
    onSaveMangel({ ...mangel, nr: nextNr });
    addToast(status === 'Aktiv' ? 'Protokolliert ✓' : 'Als Entwurf gespeichert', 'success');
    setView('dashboard');
  };

  if (view === 'einzel') return <EinzelmangelView projekt={projekt} onBack={()=>setView('dashboard')} onSave={handleSaveSingle} addToast={addToast} darkMode={darkMode} onToggleDark={onToggleDark} />;
  if (view === 'sammel') return <SammelmangelView projekt={projekt} onBack={()=>setView('dashboard')} onSave={onSaveSammel} addToast={addToast} darkMode={darkMode} onToggleDark={onToggleDark} />;
  if (view === 'liste') return <MaengellisteView projekt={projekt} maengel={maengel} onBack={()=>setView('dashboard')} onUpdate={onUpdateMangel} onDelete={onDeleteMangel} addToast={addToast} darkMode={darkMode} onToggleDark={onToggleDark} />;

  return (
    <div>
      <div className="nav">
        <div className="nav-back" onClick={onBack}><i className="ti ti-arrow-left"></i> Projekte</div>
        <div className="nav-center"><span className="nav-logo">Site<span>Verdict</span></span></div>
        <div className="nav-right">
          <div className="sync-indicator"><div className="sync-dot"></div></div>
          <BurgerMenu darkMode={darkMode} onToggleDark={onToggleDark} />
        </div>
      </div>
      <div className="main">
        <div className="projekt-info">
          <div>
            <div className="projekt-info-title">{projekt.name}</div>
            <div className="projekt-info-meta">
              {projekt.adresse && `${projekt.adresse} · `}
              {projekt.auftraggeber && `AG: ${projekt.auftraggeber} · `}
              {projekt.sachverstaendiger && `SV: ${projekt.sachverstaendiger} · `}
              Seit {fmtDate(projekt.erstellt)}
            </div>
          </div>
          <BadgeStatus status="Aktiv" />
        </div>

        <div className="metrics">
          <div className="metric"><div className="metric-val">{projektMaengel.length}</div><div className="metric-label">Gesamt</div></div>
          <div className="metric"><div className="metric-val" style={{color:'var(--warn)'}}>{counts.Entwurf}</div><div className="metric-label">Entwürfe</div></div>
          <div className="metric"><div className="metric-val" style={{color:'var(--success)'}}>{counts.Aktiv}</div><div className="metric-label">Aktiv</div></div>
          <div className="metric"><div className="metric-val" style={{color:'var(--text3)'}}>{counts.Abgeschlossen}</div><div className="metric-label">Abgeschlossen</div></div>
        </div>

        <div className="kachel-grid">
          <div className="kachel" onClick={()=>setView('einzel')}>
            <i className="ti ti-clipboard-plus"></i>
            <div className="kachel-label">Mangel erfassen</div>
            <div className="kachel-sub">Erfassen & protokollieren</div>
          </div>
          <div className="kachel" onClick={()=>setView('sammel')}>
            <i className="ti ti-list-check"></i>
            <div className="kachel-label">Multi-Mängel erfassen</div>
            <div className="kachel-sub">Schnell mehrere erfassen</div>
          </div>
          <div className="kachel" onClick={()=>setView('liste')}>
            <i className="ti ti-clipboard-list"></i>
            <div className="kachel-label">Mängelliste</div>
            <div className="kachel-sub">{projektMaengel.length} Einträge</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── NEUES PROJEKT MODAL ───────────────────────────────────────────────────────
function NeueProjektModal({ onClose, onCreate, editData }) {
  const [form, setForm] = useState(editData || { name:'', adresse:'', auftraggeber:'', sachverstaendiger:'' });
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const submit = () => {
    if (!form.name.trim()) return;
    if (editData) {
      onCreate({ ...form });
    } else {
      onCreate({ id: uid(), erstellt: now(), ...form });
    }
    onClose();
  };
  return (
    <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">{editData ? 'Projekt bearbeiten' : 'Neues Projekt anlegen'}</div>
          <i className="ti ti-x" style={{cursor:'pointer',color:'var(--text3)'}} onClick={onClose}></i>
        </div>
        <div className="modal-body">
          <div className="field"><label className="label">Projektname *</label><input className="input" placeholder="z.B. Musterstraße 12, Oldenburg" value={form.name} onChange={e=>upd('name',e.target.value)} /></div>
          <div className="field"><label className="label">Adresse</label><input className="input" placeholder="Straße, PLZ Ort" value={form.adresse} onChange={e=>upd('adresse',e.target.value)} /></div>
          <div className="field-row">
            <div className="field"><label className="label">Auftraggeber</label><input className="input" placeholder="Name" value={form.auftraggeber} onChange={e=>upd('auftraggeber',e.target.value)} /></div>
            <div className="field"><label className="label">Sachverständiger</label><input className="input" placeholder="Name" value={form.sachverstaendiger} onChange={e=>upd('sachverstaendiger',e.target.value)} /></div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" onClick={submit} disabled={!form.name.trim()}>
            <i className={`ti ${editData ? 'ti-check' : 'ti-plus'}`}></i> {editData ? 'Speichern' : 'Projekt erstellen'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── BURGER MENU COMPONENT ────────────────────────────────────────────────────
function BurgerMenu({ darkMode, onToggleDark }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  return (
    <div className="burger-menu" ref={ref}>
      <button className="burger-btn" onClick={() => setOpen(o => !o)} aria-label="Menü">
        <i className="ti ti-menu-2"></i>
      </button>
      {open && (
        <div className="burger-dropdown">
          <div className="burger-section">Darstellung</div>
          <div className="burger-item" onClick={() => { onToggleDark(); setOpen(false); }}>
            <i className={`ti ${darkMode ? 'ti-sun' : 'ti-moon'}`}></i>
            {darkMode ? 'Light Mode' : 'Dark Mode'}
          </div>
          <div className="burger-section">Info</div>
          <div className="burger-item" onClick={() => {
            const key = prompt('Neuen Groq API Key eingeben (gsk_...):');
            if (key && key.trim().startsWith('gsk_')) {
              localStorage.setItem('sv_groq_key', key.trim());
              window.location.reload();
            }
            setOpen(false);
          }}>
            <i className="ti ti-key"></i>
            API Key ändern
          </div>
          <div className="burger-item" onClick={() => { alert('SiteVerdict v1.0\nKI-gestützte Mängeldokumentation\nFelix Poit (WIB S4)\nKI im Bauwesen\nJade Hochschule Oldenburg'); setOpen(false); }}>
            <i className="ti ti-info-circle"></i>
            Über SiteVerdict
          </div>
          <div className="burger-item" onClick={() => { if(confirm('Alle lokalen Daten löschen?')) { localStorage.clear(); window.location.reload(); } setOpen(false); }}>
            <i className="ti ti-trash" style={{color:'var(--danger)'}}></i>
            <span style={{color:'var(--danger)'}}>Daten zurücksetzen</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [projekte, setProjekte] = useState(() => Storage.get('sv_projekte', []));
  const [maengel, setMaengel] = useState(() => Storage.get('sv_maengel', []));
  const [aktivProjekt, setAktivProjekt] = useState(null);
  const [showNeuModal, setShowNeuModal] = useState(false);
  const [editingProjekt, setEditingProjekt] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [darkMode, setDarkMode] = useState(() => Storage.get('sv_darkmode', false));
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('sv_groq_key') || '');

  useEffect(() => {
    document.body.classList.toggle('dark-mode', darkMode);
    Storage.set('sv_darkmode', darkMode);
  }, [darkMode]);

  useEffect(() => { Storage.set('sv_projekte', projekte); }, [projekte]);
  useEffect(() => { Storage.set('sv_maengel', maengel); }, [maengel]);

  const addToast = (msg, type='') => {
    const id = uid();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  };

  const createProjekt = (p) => {
    if (p.id && projekte.find(x => x.id === p.id)) {
      setProjekte(ps => ps.map(x => x.id === p.id ? p : x));
    } else {
      setProjekte(ps => [...ps, p]);
    }
  };

  const saveMangel = (m) => setMaengel(ms => [...ms, m]);

  const saveSammel = (maengelArr) => setMaengel(ms => [...ms, ...maengelArr]);

  const updateMangel = (updated) => setMaengel(ms => ms.map(m => m.id === updated.id ? updated : m));

  const deleteMangel = (id) => setMaengel(ms => ms.filter(m => m.id !== id));

  const deleteProjekt = (id) => {
    if (confirm('Projekt und alle zugehörigen Mängel löschen?')) {
      setProjekte(ps => ps.filter(p => p.id !== id));
      setMaengel(ms => ms.filter(m => m.projektId !== id));
      addToast('Projekt gelöscht', '');
    }
  };

  if (!apiKey) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'20px'}}>
        <div className="card" style={{maxWidth:'400px',width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:'24px'}}>
            <div style={{fontSize:'2.4rem',marginBottom:'8px'}}>🏗️</div>
            <div style={{fontSize:'1.3rem',fontWeight:'700',color:'var(--navy)'}}>SiteVerdict</div>
            <div style={{fontSize:'13px',color:'var(--text2)',marginTop:'4px'}}>KI-gestützte Mängeldokumentation für Bausachverständige</div>
          </div>
          <div className="field">
            <label className="label">Groq API Key</label>
            <input id="key-input" className="input" type="password" placeholder="gsk_..."
              onKeyDown={e => {
                if (e.key === 'Enter' && e.target.value.trim().startsWith('gsk_')) {
                  localStorage.setItem('sv_groq_key', e.target.value.trim());
                  setApiKey(e.target.value.trim());
                }
              }}
            />
            <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'6px'}}>
              Kostenlos erstellen auf <a href="https://console.groq.com" target="_blank" style={{color:'var(--gold)'}}>console.groq.com</a> · wird lokal gespeichert · nie übertragen
            </div>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginTop:'8px'}}
            onClick={() => {
              const val = document.getElementById('key-input').value.trim();
              if (val.startsWith('gsk_')) {
                localStorage.setItem('sv_groq_key', val);
                setApiKey(val);
              }
            }}>
            <i className="ti ti-login"></i> Starten
          </button>
        </div>
      </div>
    );
  }

  if (aktivProjekt) {
    const proj = projekte.find(p => p.id === aktivProjekt);
    if (!proj) { setAktivProjekt(null); return null; }
    return (
      <>
        <ProjektDashboard
          projekt={proj} maengel={maengel}
          onBack={() => setAktivProjekt(null)}
          onSaveMangel={saveMangel}
          onSaveSammel={saveSammel}
          onUpdateMangel={updateMangel}
          onDeleteMangel={deleteMangel}
          addToast={addToast}
          darkMode={darkMode}
          onToggleDark={() => setDarkMode(d=>!d)}
        />
        <ToastContainer toasts={toasts} />
      </>
    );
  }

  return (
    <>
      <div className="nav">
        <div style={{width:'80px'}}></div>
        <div className="nav-center"><span className="nav-logo">Site<span>Verdict</span></span></div>
        <div className="nav-right">
          <div className="sync-indicator"><div className="sync-dot"></div></div>
          <BurgerMenu darkMode={darkMode} onToggleDark={()=>setDarkMode(d=>!d)} />
        </div>
      </div>

      <div className="main">
        <div className="page-header">
          <div className="page-title">Projekte</div>
          <div className="page-sub">KI-gestützte Mängeldokumentation für Bausachverständige</div>
        </div>

        <div className="card card-sm" style={{marginBottom:'8px'}}>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setShowNeuModal(true)}>
            <i className="ti ti-plus"></i> Neues Projekt anlegen
          </button>
        </div>

        {projekte.length === 0 && (
          <div className="empty">
            <i className="ti ti-building"></i>
            <div className="empty-title">Noch keine Projekte</div>
            <div>Lege dein erstes Projekt an um zu starten</div>
          </div>
        )}

        <div className="project-grid">
          {projekte.map(p => {
            const pm = maengel.filter(m => m.projektId === p.id);
            const entwuerfe = pm.filter(m=>m.status==='Entwurf').length;
            const aktiv = pm.filter(m=>m.status==='Aktiv').length;
            return (
              <div key={p.id} className="project-card" onClick={()=>setAktivProjekt(p.id)}>
                <div className="project-card-title">{p.name}</div>
                <div className="project-card-sub">{p.adresse || 'Keine Adresse'}</div>
                <div style={{display:'flex',gap:'5px',flexWrap:'wrap',marginBottom:'10px'}}>
                  {entwuerfe > 0 && <span className="badge badge-entwurf">{entwuerfe} Entwurf{entwuerfe!==1?'e':''}</span>}
                  {aktiv > 0 && <span className="badge badge-aktiv">{aktiv} Aktiv</span>}
                  {pm.length === 0 && <span className="badge badge-abgeschlossen">Neu</span>}
                </div>
                <div style={{fontSize:'11px',color:'var(--text3)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>{fmtDate(p.erstellt)}</span>
                  <div style={{display:'flex',gap:'10px'}}>
                    <i className="ti ti-edit" style={{cursor:'pointer'}} title="Bearbeiten"
                      onClick={e=>{e.stopPropagation();setEditingProjekt(p);setShowNeuModal(true)}}></i>
                    <i className="ti ti-trash" style={{cursor:'pointer'}} title="Löschen"
                      onClick={e=>{e.stopPropagation();deleteProjekt(p.id)}}></i>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {showNeuModal && <NeueProjektModal onClose={()=>{setShowNeuModal(false);setEditingProjekt(null);}} onCreate={createProjekt} editData={editingProjekt} />}
      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
